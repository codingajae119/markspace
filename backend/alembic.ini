# Alembic config (s01-contract-foundation, Task 2.2).
#
# The DB URL is intentionally NOT set here (no sqlalchemy.url). migrations/env.py
# injects it from get_settings().sqlalchemy_url (single settings source; no
# hardcoded credentials). Keep this file ASCII-only: configparser reads it with
# the system locale encoding.

[alembic]
# Migration scripts location (relative to backend/).
script_location = migrations

# Prepend backend/ to sys.path so the `app` package is importable in env.py.
prepend_sys_path = .

# sqlalchemy.url is left unset on purpose - injected in env.py from Settings.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
